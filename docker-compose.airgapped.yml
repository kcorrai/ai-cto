# Air-gapped deployment: replaces Anthropic/Vercel AI Gateway with local Ollama LLM
# Usage: docker compose -f docker-compose.yml -f docker-compose.airgapped.yml up
services:
  app:
    environment:
      # Override AI Gateway to point at local Ollama (OpenAI-compatible endpoint)
      AI_GATEWAY_API_KEY: ollama
      AI_GATEWAY_BASE_URL: http://ollama:11434/v1
      AI_MODEL_ID: ${OLLAMA_MODEL:-llama3.2:3b}
      # Disable Vercel Blob — use local storage instead
      BLOB_STORE: local
      BLOB_LOCAL_DIR: /app/data/blobs
    volumes:
      - app_blobs:/app/data/blobs
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # To pull a model: docker exec <container> ollama pull llama3.2:3b
    # For GPU acceleration add: deploy: resources: reservations: devices: [{driver: nvidia, ...}]

volumes:
  app_blobs:
  ollama_models:
